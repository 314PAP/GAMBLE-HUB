<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎰 GAMBLE HUB 🎰</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎰</text></svg>">
</head>
<body>

<div class="container">
    <!-- Global Sound Toggle -->
    <div class="sound-toggle-btn" id="global-sound-toggle" onclick="toggleMuteState()">🔊</div>

    <!-- 1. LOGIN SCREEN -->
    <div id="screen-login" class="screen active">
        <h1>GAMBLE HUB</h1>
        <div class="leaderboard-card-clickable bg-black/30 border border-white/5 rounded-2xl p-4 mb-5 cursor-pointer transition-all hover:border-[#d4af37]/50 hover:shadow-[0_0_15px_rgba(212,175,55,0.15)]" onclick="otevriExplorer()">
            <div class="flex items-center justify-between font-['Orbitron',sans-serif] text-[12px] text-[var(--neon-gold)] tracking-wider mb-3 uppercase">
                <span class="flex items-center gap-1.5">🏆 Top Hráči <span class="leaderboard-badge"></span></span>
                <span class="text-[10px] text-[#475569] lowercase tracking-normal font-sans italic hover:text-[#ffd700]">detaily ➔</span>
            </div>
            <div id="leaderboard-content" class="flex flex-col gap-2">
                <span class="text-[#475569] text-xs italic">🔄 Načítám žebříček...</span>
            </div>
            <div id="visit-counter" class="text-center text-sm mt-2"></div>
        </div>
        <div class="flex flex-col gap-3">
            <button class="btn btn-primary" onclick="otevriPrihlaseni()">
                <span>Vstoupit do herny</span>
            </button>
            <button class="btn btn-success" onclick="otevriRegistraci()">
                <span>Nový hráč (100 Kč)</span>
            </button>
        </div>
    </div>

    <!-- 1B. SEZNAM ÚČTŮ -->
    <div id="screen-select-user" class="screen">
        <h2 style="color: var(--neon-purple);">👥 Vyber Účet</h2>
        <div id="users-list" class="max-h-[250px] overflow-y-auto my-4 flex flex-col gap-2.5 pr-1"></div>
        <button class="btn btn-danger mt-4" onclick="zpetDoMenu()">Zpět</button>
    </div>

    <!-- 1C. REGISTRACE -->
    <div id="screen-register" class="screen">
        <h2>🆕 Nový Hráč</h2>
        <input type="text" id="reg-name" placeholder="Zadej jméno" onkeydown="checkEnter(event, potvrditRegistraci)">
        <div class="flex flex-col gap-2.5">
            <button class="btn btn-success" onclick="potvrditRegistraci()">Vytvořit účet</button>
            <button class="btn btn-danger" onclick="zpetDoMenu()">Zpět</button>
        </div>
    </div>

    <!-- 2. MAIN HUB -->
    <div id="screen-hub" class="screen">
        <div class="flex justify-between items-center bg-black/30 border border-[#2a2a35] py-3 px-4.5 rounded-2xl mb-4 text-sm">
            <div class="font-semibold text-[#ffd700] flex items-center gap-1.5">
                <span>👤</span> <span id="hub-player-name"></span>
            </div>
            <div class="font-bold text-[#ff5500] flex items-center gap-1.5">
                <span id="hub-player-money"></span> <span>Kč</span>
            </div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
            <button class="btn btn-gold" onclick="spustitHru(5)">🎰 AUTOMAT BARY 3x3</button>
            <button class="btn btn-danger" onclick="spustitHru(6)">🃏 VÍCE / MÉNĚ (Hi-Lo)</button>
            <button class="btn btn-red" onclick="spustitHru(4)">🔴 Ruleta 0-36 (36x)</button>
            <button class="btn btn-info" onclick="spustitHru(1)">🎲 Hádanka 1-10 (10x)</button>
            <button class="btn btn-primary" onclick="spustitHru(2)">🎲 Hádanka 1-5 (5x)</button>
            <button class="btn btn-purple" onclick="spustitHru(3)">🎲 Kostka 1-6 (6x)</button>
        </div>
        <button class="btn btn-danger" onclick="odhlasitSe()">Opustit hernu</button>
    </div>

    <!-- 3. GAME SCREEN -->
    <div id="screen-game" class="screen">
        <div class="flex justify-between items-center bg-black/30 border border-[#2a2a35] py-3 px-4.5 rounded-2xl mb-4 text-sm">
            <div class="game-title-row flex items-center gap-2">
                <div id="game-title" style="font-weight:bold; color:var(--neon-blue); font-family: 'Orbitron', sans-serif;">HERNA</div>
                <button class="btn-info-toggle" id="btn-game-info" onclick="toggleInfoPanel()" title="Jak se hraje">ⓘ</button>
            </div>
            <div class="font-bold text-[#ff5500] flex items-center gap-1.5">
                <span id="game-player-money"></span> <span>Kč</span>
            </div>
        </div>

        <!-- AUTOMAT MATICE -->
        <div id="slots-area" style="display:none;">
            <div class="slot-machine">
                <div class="slot-grid">
                    <div class="slot-reel" id="reel-0">
                        <div class="slot-reel-container" id="reel-container-0"></div>
                    </div>
                    <div class="slot-reel" id="reel-1">
                        <div class="slot-reel-container" id="reel-container-1"></div>
                    </div>
                    <div class="slot-reel" id="reel-2">
                        <div class="slot-reel-container" id="reel-container-2"></div>
                    </div>
                </div>
            </div>
            <div class="slot-controls">
                <button class="btn btn-success" id="btn-spin-slots" onclick="kliknutoCislo(0)" style="margin:0;">SPIN 🎰</button>
                <button class="btn btn-auto" id="btn-auto-slots" onclick="toggleAutoPlay()" style="margin:0;">AUTO</button>
            </div>
        </div>

        <!-- HRA: VÍCE / MÉNĚ -->
        <div id="hilo-area" style="display:none;">
            <div class="hilo-container">
                <div style="font-size:12px; color:var(--text-secondary); text-transform:uppercase; letter-spacing:1px;">Aktuální karta</div>
                <div class="card-viewport">
                    <div class="hilo-card">
                        <div class="card-face card-front" id="hilo-current-card">5</div>
                        <div class="card-face card-back"></div>
                    </div>
                </div>
                <div style="font-size:11px; color:var(--text-secondary); margin-bottom:10px; text-transform:uppercase;">Další bude...</div>
                <div class="hilo-btns">
                    <button class="btn btn-primary" id="btn-hilo-high" onclick="hrajHiLo('H')">VYŠŠÍ ▲</button>
                    <button class="btn btn-danger" id="btn-hilo-low" onclick="hrajHiLo('L')">NIŽŠÍ ▼</button>
                </div>
            </div>
        </div>

        <!-- TLAČÍTKA ČÍSEL PRO KLASICKÉ HRY (hádanka, kostka, ruleta) -->
        <div id="classic-inputs" style="display:none;">
            <p style="text-align:center; color:var(--text-secondary); font-size:13px; margin-bottom:8px;">Vyber si číslo:</p>
            <div id="game-number-buttons" style="display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin-bottom:12px;"></div>
        </div>

        <!-- VOLBA SÁZKY (vždy viditelná ve hře) -->
        <div id="bet-area" style="display:grid; grid-template-columns:repeat(5,1fr); gap:6px; margin-top:8px;">
            <button class="btn btn-bet" id="bet-10" onclick="nastavSazku(10)">10</button>
            <button class="btn btn-bet" id="bet-20" onclick="nastavSazku(20)">20</button>
            <button class="btn btn-bet" id="bet-50" onclick="nastavSazku(50)">50</button>
            <button class="btn btn-bet" id="bet-100" onclick="nastavSazku(100)">100</button>
            <button class="btn btn-bet" id="bet-cust" onclick="ukazVlastniSazku()">✏️</button>
        </div>

        <!-- VLASTNÍ SÁZKA -->
        <div id="custom-sazka-area" style="display:none; margin-top:8px;">
            <input type="number" id="game-sazka" placeholder="Vlastní sázka + Enter" onkeydown="checkEnter(event, potvrditVlastniSazku)">
        </div>

        <!-- VÝSLEDKY (toast) -->
        <div id="game-result" class="status-box" style="display:none; margin-top:10px; border:1px solid rgba(255,255,255,0.15); padding:10px; border-radius:12px; background:rgba(18,18,30,0.95); text-align:center; font-size:14px;"></div>

        <!-- LIŠTA DOLE -->
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:16px;">
            <button class="btn" onclick="otevriStatsModal()">📊 Statistiky</button>
            <button class="btn btn-danger" onclick="navratDoHubu()">🚪 Menu</button>
        </div>
    </div>

    <!-- 4. SOCKA SCREEN -->
    <div id="screen-socka" class="screen socka-screen">
        <div class="socka-icon">💀</div>
        <h2 class="socka-title">Čistá Kasa</h2>
        <p id="socka-text" class="socka-desc"></p>
        <button class="btn btn-danger" onclick="zpetDoMenu()">Zpět na začátek</button>
    </div>
</div>

<!-- STATISTIKY -->
<div id="stats-modal" class="modal" onclick="zavriStatsModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 class="modal-header">📊 Přehled Hráče</h3>
        <div id="modal-stats-data" class="text-[14px] mb-3 leading-relaxed"></div>
        
        <!-- Chart.js doughnut chart container -->
        <div class="relative w-full h-[150px] my-4">
            <canvas id="stats-chart"></canvas>
        </div>

        <h4 class="mt-4 mb-1.5 text-[13px] text-[#94a3b8] uppercase tracking-wider">Posledních 10 her:</h4>
        <div id="modal-history-data" class="max-h-[150px] overflow-y-auto pr-0.5 flex flex-col gap-1.5"></div>
        <button class="btn btn-danger mt-4" onclick="zavriStatsModal()">Zavřít</button>
    </div>
</div>

<!-- EXPLORER MODAL (Global Match History & Leaderboard Detail) -->
<div id="explorer-modal" class="modal" onclick="zavriExplorer()">
    <div class="modal-content !max-w-[550px]" onclick="event.stopPropagation()">
        <h3 class="modal-header">🌐 Globální Historie & Žebříček</h3>
        
        <!-- Tabs to switch between Full Leaderboard and Match History -->
        <div class="flex gap-2 mb-4 border-b border-white/10 pb-2">
            <button id="explorer-tab-leaderboard" class="flex-1 py-1.5 text-sm font-semibold border-b-2 border-[#ff9f1c] text-[#ff9f1c] bg-transparent" onclick="prepniExplorerTab('leaderboard')">🏆 Celý Žebříček</button>
            <button id="explorer-tab-history" class="flex-1 py-1.5 text-sm font-semibold border-b-2 border-transparent text-[#94a3b8] bg-transparent" onclick="prepniExplorerTab('history')">📜 Globální Historie</button>
        </div>

        <!-- Section 1: Full Leaderboard Detail -->
        <div id="explorer-sec-leaderboard">
            <div class="mb-3">
                <input type="text" id="leaderboard-search" class="w-full text-sm bg-black/25 border border-white/10 rounded-xl px-3 py-2 text-white" placeholder="Hledat hráče..." oninput="filtrujLeaderboard()">
            </div>
            <div id="explorer-leaderboard-list" class="max-h-[300px] overflow-y-auto flex flex-col gap-2 pr-1">
                <!-- Will be populated dynamically -->
            </div>
        </div>

        <!-- Section 2: Global Match History with filters/sorting -->
        <div id="explorer-sec-history" style="display: none;">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 mb-3">
                <input type="text" id="history-search" class="text-sm bg-black/25 border border-white/10 rounded-xl px-3 py-2 text-white" placeholder="Hledat hráče..." oninput="filtrujHistorii()">
                <div class="flex gap-2">
                    <select id="history-filter-game" class="flex-1 text-sm bg-black/25 border border-white/10 rounded-xl px-2 py-2 text-[#94a3b8]" onchange="filtrujHistorii()">
                        <option value="">Všechny hry</option>
                        <option value="Bary3x3">🎰 Automat</option>
                        <option value="VíceMéně">🃏 Hi-Lo</option>
                        <option value="Ruleta">🔴 Ruleta</option>
                        <option value="Hádanka 1-10">🎲 Hádanka 1-10</option>
                        <option value="Hádanka 1-5">🎲 Hádanka 1-5</option>
                        <option value="Kostka">🎲 Kostka</option>
                    </select>
                    <select id="history-filter-result" class="flex-1 text-sm bg-black/25 border border-white/10 rounded-xl px-2 py-2 text-[#94a3b8]" onchange="filtrujHistorii()">
                        <option value="">Výsledek</option>
                        <option value="win">Pouze výhry</option>
                        <option value="loss">Pouze prohry</option>
                    </select>
                </div>
            </div>

            <!-- Sorting headers -->
            <div class="flex justify-between items-center px-2 py-1 text-[11px] text-[#475569] uppercase font-bold tracking-wider border-b border-white/5 mb-1.5">
                <button class="bg-transparent border-0 p-0 text-[11px] text-[#475569] hover:text-white" onclick="seradHistorii('timestamp')">Čas ⇅</button>
                <button class="bg-transparent border-0 p-0 text-[11px] text-[#475569] hover:text-white" onclick="seradHistorii('username')">Hráč ⇅</button>
                <button class="bg-transparent border-0 p-0 text-[11px] text-[#475569] hover:text-white" onclick="seradHistorii('winAmount')">Výhra ⇅</button>
            </div>

            <div id="explorer-history-list" class="max-h-[250px] overflow-y-auto flex flex-col gap-2 pr-1">
                <!-- Will be populated dynamically -->
            </div>
        </div>

        <button class="btn btn-danger mt-4" onclick="zavriExplorer()">Zavřít</button>
    </div>
</div>

<!-- INFO PANEL OVERLAY -->
<div id="info-panel" class="info-panel" onclick="zavriInfoPanel()">
    <div class="info-panel-content" onclick="event.stopPropagation()">
        <div class="info-panel-header">
            <span id="info-panel-title">Jak se hraje</span>
            <button class="info-panel-close" onclick="zavriInfoPanel()">✕</button>
        </div>
        <div id="info-panel-body" class="info-panel-body"></div>
    </div>
</div>


</body>
<script type="module" src="/src/main.js"></script>
