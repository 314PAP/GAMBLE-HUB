<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAMBLE HUB</title>
    <link rel="icon" type="image/svg+xml" href="/assets/node_icon.svg">
</head>
<body>
<div class="container">
    <div class="sound-toggle-btn" id="global-sound-toggle" onclick="toggleMuteState()">Sound</div>

    <div id="screen-login" class="screen active">
        <h1>GAMBLE HUB</h1>
        <div class="leaderboard-card-clickable bg-[rgba(13,0,26,0.6)] border border-[rgba(189,0,255,0.3)] rounded-2xl p-4 mb-5 cursor-pointer transition-all hover:border-[var(--neon-gold)] hover:shadow-[0_0_15px_var(--neon-gold-glow)]" onclick="otevriExplorer()">
            <div class="flex items-center justify-between font-['Orbitron',sans-serif] text-[12px] text-[var(--neon-gold)] tracking-wider mb-3 uppercase" style="text-shadow: 0 0 5px var(--neon-gold-glow);">
                <span class="flex items-center gap-1.5">Top Hráči <span class="leaderboard-badge"></span></span>
                <span class="text-[10px] text-[var(--neon-cyan)] lowercase tracking-normal font-sans italic" style="text-shadow: 0 0 5px var(--neon-cyan-glow);">detaily ➔</span>
            </div>
            <div id="leaderboard-content" class="flex flex-col gap-2">
                <span class="text-[var(--neon-gold)] text-xs italic" style="text-shadow: 0 0 5px var(--neon-gold-glow);">Načítám žebříček...</span>
            </div>
            <div id="visit-counter" class="text-center text-sm mt-2" style="color: var(--neon-cyan); text-shadow: 0 0 5px var(--neon-cyan-glow);"></div>
        </div>
        <div class="flex flex-col gap-3">
            <button id="btn-enter" class="btn btn-primary" onclick="otevriPrihlaseni()"><span class="icon-node"></span> Vstoupit do herny</button>
            <button id="btn-create-player" class="btn btn-success" onclick="otevriRegistraci()"><span class="icon-node"></span> Nový hráč (100 Kč)</button>
        </div>
    </div>

    <div id="screen-select-user" class="screen">
        <h2 style="color: var(--neon-purple);">Vyber Účet</h2>
        <div id="users-list" class="max-h-[250px] overflow-y-auto my-4 flex flex-col gap-2.5 pr-1"></div>
        <button class="btn btn-danger mt-4" onclick="zpetDoMenu()">Zpět</button>
    </div>

    <div id="screen-register" class="screen">
        <h2><span class="icon-node"></span> Nový Hráč</h2>
        <input type="text" id="reg-name" placeholder="Zadej jméno" onkeydown="checkEnter(event, potvrditRegistraci)">
        <div class="flex flex-col gap-2.5">
            <button class="btn btn-success" onclick="potvrditRegistraci()">Vytvořit účet</button>
            <button class="btn btn-danger" onclick="zpetDoMenu()">Zpět</button>
        </div>
    </div>

    <div id="screen-hub" class="screen">
        <div class="game-header-bar mb-4 text-sm">
            <div style="color: var(--neon-gold); text-shadow: 0 0 8px var(--neon-gold-glow);">
                <span class="icon-node"></span> <span id="hub-player-name"></span>
            </div>
            <div style="color: var(--neon-green); text-shadow: 0 0 8px var(--neon-green-glow);">
                <span id="hub-player-money"></span> <span>Kč</span>
            </div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
            <button class="btn btn-gold" onclick="spustitHru(5)"><span class="icon-node"></span> AUTOMAT BARY 3x3</button>
            <button class="btn btn-danger" onclick="spustitHru(6)"><span class="icon-node"></span> VÍCE / MÉNĚ (Hi-Lo)</button>
            <button class="btn btn-red" onclick="spustitHru(4)"><span class="icon-node"></span> Ruleta 0-36 (36x)</button>
            <button class="btn btn-info" onclick="spustitHru(1)"><span class="icon-node"></span> Hádanka 1-10 (10x)</button>
            <button class="btn btn-primary" onclick="spustitHru(2)"><span class="icon-node"></span> Hádanka 1-5 (5x)</button>
            <button class="btn btn-purple" onclick="spustitHru(3)"><span class="icon-node"></span> Kostka 1-6 (6x)</button>
        </div>
        <button class="btn btn-danger" onclick="odhlasitSe()">Opustit hernu</button>
    </div>

    <div id="screen-game" class="screen">
        <div class="game-header-bar">
            <div class="game-title-row flex items-center gap-2">
                <div id="game-title" class="game-title">HERNA</div>
                <button class="btn-info-toggle" id="btn-game-info" onclick="toggleInfoPanel()" title="Jak se hraje">ⓘ</button>
            </div>
            <div style="color: var(--neon-green); text-shadow: 0 0 8px var(--neon-green-glow);">
                <span id="game-player-money"></span> <span>Kč</span>
            </div>
        </div>

        <div id="slots-area" style="display:none;">
            <div class="slot-machine">
                <div class="slot-grid">
                    <div class="slot-reel" id="reel-0"><div class="slot-reel-container" id="reel-container-0"></div></div>
                    <div class="slot-reel" id="reel-1"><div class="slot-reel-container" id="reel-container-1"></div></div>
                    <div class="slot-reel" id="reel-2"><div class="slot-reel-container" id="reel-container-2"></div></div>
                </div>
            </div>
            <div class="slot-controls">
                <button class="btn btn-spin-slots" id="btn-spin-slots" onclick="kliknutoCislo(0)"><span class="icon-node"></span> SPIN</button>
                <button class="btn btn-auto-slots" id="btn-auto-slots" onclick="toggleAutoPlay()"><span class="icon-node"></span> AUTO</button>
            </div>
        </div>

        <div id="hilo-area" style="display:none;">
            <div class="hilo-container">
                <div class="text-center text-[var(--text-secondary)] text-[13px] uppercase tracking-wider mb-2">Aktuální karta</div>
                <div class="card-viewport">
                    <div class="hilo-card">
                        <div class="card-face card-front" id="hilo-current-card">5</div>
                        <div class="card-face card-back"></div>
                    </div>
                </div>
                <div class="text-center text-[var(--text-secondary)] text-[11px] uppercase mb-2">Další bude...</div>
                <div class="hilo-btns">
                    <button class="btn btn-spin-slots" id="btn-hilo-high" onclick="hrajHiLo('H')"><span class="icon-node"></span> VYŠŠÍ</button>
                    <button class="btn btn-danger" id="btn-hilo-low" onclick="hrajHiLo('L')"><span class="icon-node"></span> NIŽŠÍ</button>
                </div>
            </div>
        </div>

        <div id="classic-inputs" style="display:none;">
            <p class="text-center text-[var(--text-secondary)] text-[13px] mb-2">Vyber si číslo:</p>
            <div id="game-number-buttons" class="number-grid-bar"></div>
        </div>

        <div id="bet-area" class="bet-area-grid">
            <button class="btn btn-bet" id="bet-10" onclick="nastavSazku(10)"><span class="icon-node"></span> 10</button>
            <button class="btn btn-bet" id="bet-20" onclick="nastavSazku(20)"><span class="icon-node"></span> 20</button>
            <button class="btn btn-bet" id="bet-50" onclick="nastavSazku(50)"><span class="icon-node"></span> 50</button>
            <button class="btn btn-bet" id="bet-100" onclick="nastavSazku(100)"><span class="icon-node"></span> 100</button>
            <button class="btn btn-bet" id="bet-cust" onclick="ukazVlastniSazku()"><span class="icon-node"></span></button>
        </div>

        <div id="custom-sazka-area" style="display:none; margin-top:8px;">
            <input type="number" id="game-sazka" placeholder="Vlastní sázka + Enter" onkeydown="checkEnter(event, potvrditVlastniSazku)">
        </div>

        <div id="game-result" class="status-box" style="display:none; margin-top:10px;"></div>

        <div class="grid grid-cols-2 gap-3 mt-4">
            <button class="btn" onclick="otevriStatsModal()">Statistiky</button>
            <button class="btn btn-danger" onclick="navratDoHubu()">Menu</button>
        </div>
    </div>

    <div id="screen-socka" class="screen socka-screen">
        <div class="socka-icon">💀</div>
        <h2 class="socka-title">Čistá Kasa</h2>
        <p id="socka-text" class="socka-desc"></p>
        <button class="btn btn-danger" onclick="zpetDoMenu()">Zpět na začátek</button>
    </div>
</div>

<div id="stats-modal" class="modal" onclick="zavriStatsModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 class="modal-header">Přehled Hráče</h3>
        <div id="modal-stats-data" class="text-[14px] mb-3 leading-relaxed"></div>
        <div class="relative w-full h-[150px] my-4"><canvas id="stats-chart"></canvas></div>
        <h4 class="mt-4 mb-1.5 text-[13px] text-[var(--neon-cyan)] uppercase tracking-wider" style="text-shadow: 0 0 4px var(--neon-cyan-glow);">Posledních 10 her:</h4>
        <div id="modal-history-data" class="max-h-[150px] overflow-y-auto pr-0.5 flex flex-col gap-1.5"></div>
        <button class="btn btn-danger mt-4" onclick="zavriStatsModal()">Zavřít</button>
    </div>
</div>

<div id="explorer-modal" class="modal" onclick="zavriExplorer()">
    <div class="modal-content !max-w-[550px]" onclick="event.stopPropagation()">
        <h3 class="modal-header">Globální Historie & Žebříček</h3>
        <div class="flex gap-2 mb-4 border-b border-[rgba(189,0,255,0.2)] pb-2">
            <button id="explorer-tab-leaderboard" onclick="prepniExplorerTab('leaderboard')" class="flex-1 py-1.5 text-sm font-bold border-b-2 border-[var(--neon-orange)] text-[var(--neon-orange)] bg-transparent">Celý Žebříček</button>
            <button id="explorer-tab-history" onclick="prepniExplorerTab('history')" class="flex-1 py-1.5 text-sm font-bold border-b-2 border-transparent text-[var(--neon-gold)] bg-transparent">📜 Globální Historie</button>
        </div>
        <div id="explorer-sec-leaderboard">
            <div class="mb-3">
                <input type="text" id="leaderboard-search" class="w-full text-sm bg-[rgba(13,0,26,0.6)] border border-[var(--neon-purple)] rounded-xl px-3 py-2 text-[var(--neon-gold)]" placeholder="Hledat hráče..." oninput="filtrujLeaderboard()">
            </div>
            <div id="explorer-leaderboard-list" class="max-h-[300px] overflow-y-auto flex flex-col gap-2 pr-1"></div>
        </div>
        <div id="explorer-sec-history" style="display: none;">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 mb-3">
                <input type="text" id="history-search" class="text-sm bg-[rgba(13,0,26,0.6)] border border-[var(--neon-purple)] rounded-xl px-3 py-2 text-[var(--neon-gold)]" placeholder="Hledat hráče..." oninput="filtrujHistorii()">
                <div class="flex gap-2">
                    <select id="history-filter-game" class="flex-1 text-sm bg-[rgba(13,0,26,0.6)] border border-[var(--neon-purple)] rounded-xl px-2 py-2 text-[var(--neon-gold)]" onchange="filtrujHistorii()">
                        <option value="">Všechny hry</option>
                        <option value="Bary3x3">Automat</option>
                        <option value="VíceMéně">Hi-Lo</option>
                        <option value="Ruleta">Ruleta</option>
                        <option value="Hádanka 1-10">Hádanka 1-10</option>
                        <option value="Hádanka 1-5">Hádanka 1-5</option>
                        <option value="Kostka">Kostka</option>
                    </select>
                    <select id="history-filter-result" class="flex-1 text-sm bg-[rgba(13,0,26,0.6)] border border-[var(--neon-purple)] rounded-xl px-2 py-2 text-[var(--neon-gold)]" onchange="filtrujHistorii()">
                        <option value="">Výsledek</option>
                        <option value="win">Pouze výhry</option>
                        <option value="loss">Pouze prohry</option>
                    </select>
                </div>
            </div>
            <div class="flex justify-between items-center px-2 py-1 text-[11px] text-[var(--neon-gold)] uppercase font-bold tracking-wider border-b border-[rgba(189,0,255,0.2)] mb-1.5">
                <button onclick="seradHistorii('timestamp')" class="bg-transparent border-0 p-0 text-[11px] text-[var(--neon-gold)] hover:text-[var(--neon-cyan)]" style="text-shadow: 0 0 4px var(--neon-gold-glow);">Čas ⇅</button>
                <button onclick="seradHistorii('username')" class="bg-transparent border-0 p-0 text-[11px] text-[var(--neon-gold)] hover:text-[var(--neon-cyan)]" style="text-shadow: 0 0 4px var(--neon-gold-glow);">Hráč ⇅</button>
                <button onclick="seradHistorii('winAmount')" class="bg-transparent border-0 p-0 text-[11px] text-[var(--neon-gold)] hover:text-[var(--neon-cyan)]" style="text-shadow: 0 0 4px var(--neon-gold-glow);">Výhra ⇅</button>
            </div>
            <div id="explorer-history-list" class="max-h-[250px] overflow-y-auto flex flex-col gap-2 pr-1"></div>
        </div>
        <button class="btn btn-danger mt-4" onclick="zavriExplorer()">Zavřít</button>
    </div>
</div>

<div id="info-panel" class="info-panel" onclick="zavriInfoPanel()">
    <div class="info-panel-content" onclick="event.stopPropagation()">
        <div class="info-panel-header">
            <span id="info-panel-title">Jak se hraje</span>
            <button class="info-panel-close" onclick="zavriInfoPanel()">✕</button>
        </div>
        <div id="info-panel-body" class="info-panel-body"></div>
    </div>
</div>

</body>
<script type="module" src="/src/main.js"></script>
</html>
