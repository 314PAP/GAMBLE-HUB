<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAMBLE HUB</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230a0a12'/%3E%3Ctext x='50' y='60' font-family='Arial' font-size='50' text-anchor='middle'%3E🎰%3C/text%3E%3C/svg%3E">
</head>
<body>
<main class="container" role="main" aria-label="Herní aplikace">
     <section id="screen-login" class="screen active" aria-labelledby="login-title">
        <h1 id="login-title">GAMBLE HUB</h1>
<button id="leaderboard-card" class="rounded-2xl mb-5 cursor-pointer transition-all w-full overflow-hidden relative" onclick="otevriExplorer()" aria-label="Zobrazit globální žebříček a historii" style="background: linear-gradient(135deg, rgba(13,0,26,0.4), rgba(13,0,26,0.6)); border: 2px solid transparent; animation: scoreBorderGlow 4s linear infinite; box-shadow: 0 0 15px rgba(0,0,0,0.3), inset 0 0 10px rgba(0,0,0,0.3);">
              <div style="font-family: 'Orbitron', sans-serif; font-size: 11px; color: var(--neon-gold); letter-spacing: 0.06em; text-transform: uppercase; padding: 16px 16px 8px 16px;">
                 <span class="flex items-center gap-1.5" style="gap: 10px;">Top Hráči <span class="leaderboard-badge"></span></span>
             </div>
<div id="leaderboard-content" role="list" class="flex flex-col" style="padding: 0 16px 16px 16px; max-height: 180px; overflow-y: auto;">
                <span class="text-[var(--neon-gold)] text-xs italic" style="text-shadow: 0 0 5px var(--neon-gold-glow); margin-bottom: 2px;">Načítám žebříček...</span>
            </div>
        </button>
        <div class="flex flex-col gap-3 w-full">
            <button type="button" id="btn-enter" class="btn btn-primary" onclick="otevriPrihlaseni()">Vstoupit do herny</button>
            <button type="button" id="btn-create-player" class="btn btn-success" onclick="otevriRegistraci()">NOVÝ HRÁČ</button>
        </div>
    </section>

    <section id="screen-select-user" class="screen" aria-labelledby="select-user-title">
        <h2 id="select-user-title">Vyber Účet</h2>
        <div id="users-list" role="list" aria-label="Seznam dostupných účtů" class="max-h-[250px] overflow-y-auto my-4 flex flex-col gap-4 pr-1"></div>
        <button class="btn btn-danger px-4 w-auto" onclick="zpetDoMenu()">Zpět</button>
    </section>

    <section id="screen-register" class="screen" aria-labelledby="register-title">
        <h2 id="register-title">Nový Hráč</h2>
        <input type="text" id="reg-name" placeholder="Zadej jméno" aria-label="Jméno hráče" onkeydown="checkEnter(event, potvrditRegistraci)">
        <div class="flex flex-col gap-2.5" role="group" aria-label="Registrace">
            <button class="btn btn-success" onclick="potvrditRegistraci()">Vytvořit účet</button>
            <button class="btn btn-danger" onclick="zpetDoMenu()">Zpět</button>
        </div>
    </section>

    <section id="screen-hub" class="screen">
<header class="game-header-bar bg-gradient-to-br from-[#020205] via-[#020205] to-[#020205] border-2 border-[#1a1a2e] rounded-xl mb-4 p-3">
            <div class="flex items-center justify-between w-full gap-2">
                <div class="text-xs sm:text-sm md:text-base truncate text-[var(--neon-gold)]" style="text-shadow: 0 0 8px var(--neon-gold-glow);">
                    <span id="hub-player-name" class="sr-only">Jméno hráče</span>
                </div>
                <div class="text-xs sm:text-sm md:text-base whitespace-nowrap text-[var(--neon-green)]" style="text-shadow: 0 0 8px var(--neon-green-glow);">
                    <span id="hub-player-money"></span>&nbsp;<svg class="coin-icon-svg" viewBox="0 0 24 24" style="width:16px;height:16px;vertical-align:middle;"><circle cx="12" cy="12" r="10" fill="#d4af37"/><text x="12" y="17" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a2e">$</text></svg>
                </div>
            </div>
        </header>
        <nav aria-label="Výběr hry" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <button class="btn btn-gold pl-3" onclick="spustitHru(5)">AUTOMAT</button>
            <button class="btn btn-danger pl-3" onclick="spustitHru(6)">HI-LOW</button>
            <button class="btn btn-red pl-3" onclick="spustitHru(4)">Ruleta 0-36 (36x)</button>
            <button class="btn btn-info pl-3" onclick="spustitHru(1)">Hádanka 1-10 (10x)</button>
            <button class="btn btn-primary pl-3" onclick="spustitHru(2)">Hádanka 1-5 (5x)</button>
            <button class="btn btn-purple pl-3" onclick="spustitHru(3)">Kostka 1-6 (6x)</button>
        </nav>
        <button id="btn-logout" class="btn btn-danger" onclick="odhlasitSe()">Opustit hernu</button>
    </section>

    <section id="screen-game" class="screen" aria-labelledby="game-title">
        <header class="game-header-bar flex flex-col" role="region" aria-label="Herní lišta">
            <div class="flex items-center justify-between w-full gap-2">
                <div id="game-title" class="game-title" aria-hidden="true">AUTOMAT</div>
                <div class="flex items-center gap-3">
                    <div class="text-xs sm:text-sm md:text-base truncate text-[var(--neon-gold)]" style="text-shadow: 0 0 8px var(--neon-gold-glow);">
                        <span id="game-player-name"></span>
                    </div>
                    <button class="btn-info-toggle" id="btn-game-info" onclick="toggleInfoPanel()" aria-label="Jak se hraje">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                    </button>
                    <button class="sound-toggle-btn" id="global-sound-toggle" onclick="toggleMuteState()" title="Zvuk" aria-label="Přepnout zvuk">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                    </button>
                </div>
            </div>
            <div class="text-center text-[11px] sm:text-xs md:text-sm mt-2 text-[var(--neon-green)]" style="text-shadow: 0 0 8px var(--neon-green-glow);">
                <span id="game-player-money"></span>&nbsp;<svg class="coin-icon-svg" viewBox="0 0 24 24" style="width:16px;height:16px;vertical-align:middle;"><circle cx="12" cy="12" r="10" fill="#d4af37"/><text x="12" y="17" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a2e">$</text></svg>
            </div>
        </header>

        <article id="slots-area" style="display:none;" aria-labelledby="slots-title">
            <h3 id="slots-title" class="sr-only">Automat</h3>
            <div class="slot-machine" role="region" aria-label="Automat">
                <div class="slot-grid">
                    <div class="slot-reel" id="reel-0" aria-label="Ruleta 1"><div class="slot-reel-container" id="reel-container-0"></div></div>
                    <div class="slot-reel" id="reel-1" aria-label="Ruleta 2"><div class="slot-reel-container" id="reel-container-1"></div></div>
                    <div class="slot-reel" id="reel-2" aria-label="Ruleta 3"><div class="slot-reel-container" id="reel-container-2"></div></div>
                </div>
            </div>
            <div class="slot-controls" role="region" aria-label="Ovládání automatu">
                <button class="btn btn-spin-slots" id="btn-spin-slots" onclick="kliknutoCislo(0)"><span class="icon-node" aria-hidden="true"></span> SPIN</button>
                <button class="btn btn-auto-slots" id="btn-auto-slots" onclick="toggleAutoPlay()"><span class="icon-node" aria-hidden="true"></span> AUTO</button>
            </div>
        </article>

        <article id="hilo-area" style="display:none;" aria-labelledby="hilo-title">
            <h3 id="hilo-title" class="sr-only">HI-LOW</h3>
            <div class="hilo-container" role="region" aria-label="HI-LOW hra">
                <div class="card-label">AKTUÁLNÍ KARTA</div>
                <div id="hilo-current-card" class="hilo-card-face">5</div>
                <div class="card-label">DALŠÍ KARTA</div>
                <div class="hilo-btns" role="region" aria-label="Ovládání HI-LOW">
                    <button class="btn btn-spin-slots" id="btn-hilo-high" onclick="hrajHiLo('H')"><span class="icon-node" aria-hidden="true"></span> VYŠŠÍ</button>
                    <button class="btn btn-danger" id="btn-hilo-low" onclick="hrajHiLo('L')"><span class="icon-node" aria-hidden="true"></span> NIŽŠÍ</button>
                </div>
            </div>
        </article>

        <article id="classic-inputs" style="display:none;" aria-labelledby="classic-title">
            <h3 id="classic-title" class="sr-only">Výběr čísla</h3>
            <p class="text-center text-[var(--text-secondary)] text-[13px] mb-2">Vyber si číslo: <span class="sr-only">Kliknutím vyberte číslo 0-36</span></p>
            <div id="game-number-buttons" role="group" aria-label="Výběr čísla"></div>
        </article>

<article id="dice-area" style="display:none;" aria-labelledby="dice-title">
            <h3 id="dice-title" class="sr-only">Kostka</h3>
            <p class="text-center text-[var(--text-secondary)] text-[13px]">Vyber číslo:</p>
            <div class="flex justify-center">
                <div id="dice-frame" class="dice-frame" role="region" aria-label="Zobrazení kostky">
                    <span id="dice-display" class="dice-display" aria-live="polite" aria-atomic="true">?</span>
                </div>
            </div>
            <div class="dice-numbers-grid" role="region" aria-label="Ovládání Kostky">
                 <button class="btn btn-bet dice-num-btn" data-num="1" aria-label="Sázet na 1">1</button>
                 <button class="btn btn-bet dice-num-btn" data-num="2" aria-label="Sázet na 2">2</button>
                 <button class="btn btn-bet dice-num-btn" data-num="3" aria-label="Sázet na 3">3</button>
                 <button class="btn btn-bet dice-num-btn" data-num="4" aria-label="Sázet na 4">4</button>
                 <button class="btn btn-bet dice-num-btn" data-num="5" aria-label="Sázet na 5">5</button>
                 <button class="btn btn-bet dice-num-btn" data-num="6" aria-label="Sázet na 6">6</button>
             </div>
        </article>

        <div id="bet-area" class="bet-area-grid grid grid-cols-5 mt-4 gap-1.5" role="region" aria-label="Volba sázky">
            <button class="btn btn-bet text-[10px] sm:text-xs py-1 px-0.5" id="bet-10" onclick="nastavSazku(10)">10</button>
            <button class="btn btn-bet text-[10px] sm:text-xs py-1 px-0.5" id="bet-20" onclick="nastavSazku(20)">20</button>
            <button class="btn btn-bet text-[10px] sm:text-xs py-1 px-0.5" id="bet-50" onclick="nastavSazku(50)">50</button>
            <button class="btn btn-bet text-[10px] sm:text-xs py-1 px-0.5" id="bet-100" onclick="nastavSazku(100)">100</button>
            <button class="btn btn-bet text-[10px] sm:text-xs py-1 px-0.5 !min-w-[36px]" id="bet-cust" onclick="ukazVlastniSazku()" aria-label="Vlastní sázka">
                <span aria-hidden="true">•••</span>
            </button>
        </div>

        <div id="custom-sazka-area" style="display:none;" role="region" aria-label="Vlastní sázka">
            <input type="number" id="game-sazka" placeholder="Vlastní sázka + Enter" aria-label="Zadej vlastní částku" onkeydown="checkEnter(event, potvrditVlastniSazku)">
        </div>

        <div id="game-result" class="status-box" role="status" aria-live="polite" style="display:none;"></div>

        <div class="flex w-full gap-3" role="group" aria-label="Akce během hry">
            <button class="btn btn-info flex-1" onclick="otevriStatsModal()">Statistiky</button>
            <button class="btn btn-danger flex-1" onclick="navratDoHubu()">Menu</button>
        </div>
    </section>

    <section id="screen-socka" class="screen socka-screen" aria-labelledby="socka-title">
        <div class="socka-icon" aria-hidden="true">💀</div>
        <h2 id="socka-title" class="socka-title">Čistá Kasa</h2>
        <p id="socka-text" class="socka-desc"></p>
        <button class="btn btn-danger" onclick="zpetDoMenu()">Zpět na začátek</button>
    </section>
</main>

<div id="stats-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="stats-modal-title" onclick="zavriStatsModal()">
        <div class="modal-content" role="document" onclick="event.stopPropagation()">
            <h3 id="stats-modal-title" class="modal-header">Přehled Hráče</h3>
        <div id="modal-stats-data" class="text-[14px] mb-3 leading-relaxed"></div>
        <div class="relative w-full h-[150px] my-4"><canvas id="stats-chart"></canvas></div>
        <h4 class="mt-4 mb-1.5 text-[13px] text-[var(--neon-cyan)] uppercase tracking-wider" style="text-shadow: 0 0 4px var(--neon-cyan-glow);">Posledních 10 her:</h4>
        <div id="modal-history-data" role="list" class="max-h-[150px] overflow-y-auto pr-0.5 flex flex-col gap-1.5"></div>
        <button class="btn btn-danger mt-4" onclick="zavriStatsModal()" aria-label="Zavřít statistiky">Zavřít</button>
    </div>
</div>

<div id="explorer-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="explorer-modal-title" onclick="zavriExplorer()">
    <div class="modal-content !max-w-[550px]" role="document" onclick="event.stopPropagation()">
        <h3 id="explorer-modal-title" class="modal-header">Globální Historie & Žebříček</h3>
        <div class="flex gap-2 mb-4 border-b border-[rgba(189,0,255,0.2)] pb-2">
            <button id="explorer-tab-leaderboard" onclick="prepniExplorerTab('leaderboard')" class="flex-1 py-1.5 text-sm font-bold border-b-2 border-[var(--neon-orange)] text-[var(--neon-orange)] bg-transparent">
                <span class="leaderboard-tab-icon" aria-hidden="true">🏆</span> Celý Žebříček
            </button>
            <button id="explorer-tab-history" onclick="prepniExplorerTab('history')" class="flex-1 py-1.5 text-sm font-bold border-b-2 border-transparent text-[var(--neon-gold)] bg-transparent">
                <span aria-hidden="true">📜</span> <span>Globální Historie</span>
            </button>
        </div>
<div id="explorer-sec-leaderboard">
             <div class="mb-3">
                 <input type="text" id="leaderboard-search" aria-label="Hledat hráče v žebříčku" class="w-full text-sm bg-[rgba(13,0,26,0.6)] border border-[var(--neon-purple)] rounded-xl px-3 py-2 text-[var(--neon-gold)]" placeholder="Hledat hráče..." oninput="filtrujLeaderboard()">
             </div>
            <div id="explorer-leaderboard-list" role="list" class="max-h-[300px] overflow-y-auto flex flex-col gap-2 pr-1"></div>
        </div>
        <div id="explorer-sec-history" style="display: none;">
<div class="grid grid-cols-1 sm:grid-cols-2 gap-2 mb-3">
                 <input type="text" id="history-search" aria-label="Hledat v historii" class="text-sm bg-[rgba(13,0,26,0.6)] border border-[var(--neon-purple)] rounded-xl px-3 py-2 text-[var(--neon-gold)]" placeholder="Hledat hráče..." oninput="filtrujHistorii()">
                 <div class="flex gap-2">
                     <select id="history-filter-game" aria-label="Filtr podle hry" class="flex-1 text-sm bg-[rgba(13,0,26,0.6)] border border-[var(--neon-purple)] rounded-xl px-2 py-2 text-[var(--neon-gold)]" onchange="filtrujHistorii()">
                        <option value="">Všechny hry</option>
                        <option value="Bary3x3">Automat</option>
                        <option value="VíceMéně">HI-LOW</option>
                        <option value="Ruleta">Ruleta</option>
                        <option value="Hádanka 1-10">Hádanka 1-10</option>
                        <option value="Hádanka 1-5">Hádanka 1-5</option>
                        <option value="Kostka">Kostka</option>
                    </select>
                    <select id="history-filter-result" aria-label="Filtr podle výsledku" class="flex-1 text-sm bg-[rgba(13,0,26,0.6)] border border-[var(--neon-purple)] rounded-xl px-2 py-2 text-[var(--neon-gold)]" onchange="filtrujHistorii()">
                        <option value="">Výsledek</option>
                        <option value="win">Pouze výhry</option>
                        <option value="loss">Pouze prohry</option>
                    </select>
                </div>
            </div>
            <div class="flex justify-between items-center px-2 py-1 text-[11px] text-[var(--neon-gold)] uppercase font-bold tracking-wider border-b border-[rgba(189,0,255,0.2)] mb-1.5" role="row">
                <button onclick="seradHistorii('timestamp')" aria-sort="none" class="bg-transparent border-0 p-0 text-[11px] text-[var(--neon-gold)] hover:text-[var(--neon-cyan)]" style="text-shadow: 0 0 4px var(--neon-gold-glow);">Čas ⇅</button>
                <button onclick="seradHistorii('username')" aria-sort="none" class="bg-transparent border-0 p-0 text-[11px] text-[var(--neon-gold)] hover:text-[var(--neon-cyan)]" style="text-shadow: 0 0 4px var(--neon-gold-glow);">Hráč ⇅</button>
                <button onclick="seradHistorii('winAmount')" aria-sort="none" class="bg-transparent border-0 p-0 text-[11px] text-[var(--neon-gold)] hover:text-[var(--neon-cyan)]" style="text-shadow: 0 0 4px var(--neon-gold-glow);">Výhra ⇅</button>
            </div>
            <div id="explorer-history-list" role="list" class="max-h-[250px] overflow-y-auto flex flex-col gap-2 pr-1"></div>
        </div>
        <div class="text-center">
            <button class="btn btn-danger inline-block" onclick="zavriExplorer()" aria-label="Zavřít explorer">Zavřít</button>
        </div>
    </div>
</div>

<div id="info-panel" class="info-panel" role="dialog" aria-modal="true" aria-labelledby="info-panel-title" onclick="zavriInfoPanel()">
    <div class="info-panel-content" role="document" onclick="event.stopPropagation()">
        <div class="info-panel-header">
            <span id="info-panel-title">Jak se hraje</span>
            <button class="info-panel-close" onclick="zavriInfoPanel()" aria-label="Zavřít informace">✕</button>
        </div>
        <div id="info-panel-body" class="info-panel-body"></div>
    </div>
</div>

<div id="delete-confirm-dialog" class="delete-confirm-dialog" role="dialog" aria-modal="true" aria-labelledby="delete-confirm-title" onclick="zavriDeleteConfirm()" style="display: none;">
    <div class="delete-confirm-content" role="document" onclick="event.stopPropagation()" style="padding: 32px 36px; min-width: 280px;">
        <div class="delete-confirm-header" style="margin-bottom: 24px;">
            <span class="delete-confirm-icon" aria-hidden="true">⚠️</span>
            <span id="delete-confirm-title" style="font-size: 18px;">Smazat účet?</span>
        </div>
        <div class="delete-confirm-actions" style="gap: 24px; padding-bottom: 8px;">
            <button class="btn btn-success" onclick="zavriDeleteConfirm()" aria-label="Zrušit smazání">Ne</button>
            <button class="btn btn-danger" id="delete-confirm-yes" aria-label="Potvrdit smazání účtu">Smazat</button>
        </div>
    </div>
</div>

</body>
<script type="module" src="/src/main.js"></script>
</html>
