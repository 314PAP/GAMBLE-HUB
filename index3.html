<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎰 Neon Gamble Club 🎰</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --card: #121216;
            --text: #f0f0f3;
            --primary: #ffaa00;
            --success: #00f5d4;
            --danger: #ff0055;
            --info: #00b4d8;
            --gold: #ffee00;
            --neon-glow: 0 0 10px rgba(255, 170, 0, 0.3);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background-color: var(--card);
            border: 2px solid #22222a;
            border-radius: 16px;
            padding: 16px;
            box-sizing: border-box;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        h1 { 
            text-align: center; 
            color: var(--primary); 
            margin: 5px 0 15px 0; 
            font-size: 26px;
            text-shadow: 0 0 8px rgba(255,170,0,0.4);
            letter-spacing: 1px;
        }
        h2, h3 { text-align: center; color: #fff; margin: 10px 0; }
        .screen { display: none; }
        .screen.active { display: block; }

        .btn {
            background: linear-gradient(145deg, #1e1e24, #141418);
            color: var(--text);
            border: 1px solid #333340;
            padding: 12px;
            margin: 6px 0;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            font-family: inherit;
            transition: all 0.1s ease;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
        }
        .btn:active { transform: scale(0.98); background: #18181f; }

        .btn-primary { border-color: var(--primary); color: var(--primary); box-shadow: 0 0 8px rgba(255,170,0,0.15); }
        .btn-success { border-color: var(--success); color: var(--success); box-shadow: 0 0 8px rgba(0,245,212,0.15); }
        .btn-danger { border-color: var(--danger); color: var(--danger); box-shadow: 0 0 8px rgba(255,0,85,0.15); }

        .number-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin: 10px 0;
            max-height: 190px;
            overflow-y: auto;
            padding: 2px;
        }

        .btn-num {
            padding: 12px 2px;
            font-size: 15px;
            background: #181820;
            border: 1px solid #2d2d3a;
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-num:active { background: var(--info); color: #000; }

        .bet-buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin: 12px 0;
        }
        
        .btn-bet {
            padding: 10px 2px;
            font-size: 14px;
            border-color: #2d2d3a;
            color: #777;
            background: #111115;
            margin: 0;
        }

        .btn-bet.selected {
            border-color: var(--info);
            color: #fff;
            background: rgba(0, 180, 216, 0.15);
            box-shadow: 0 0 10px rgba(0, 180, 216, 0.3);
        }

        .slot-controls {
            display: grid;
            grid-template-columns: 3fr 1fr;
            gap: 8px;
            margin: 8px 0;
        }

        .btn-auto {
            background: #15151c;
            border: 1px solid #444;
            color: #aaa;
        }
        .btn-auto.active {
            background: var(--danger);
            color: white;
            border-color: var(--danger);
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { box-shadow: 0 0 4px var(--danger); } to { box-shadow: 0 0 12px var(--danger); }
        }

        .user-row { display: flex; gap: 8px; margin: 6px 0; }
        .btn-user-select { flex-grow: 1; margin: 0; text-align: left; padding-left: 12px; }
        .btn-delete { width: auto; margin: 0; background: #221216; border-color: #441a22; color: var(--danger); }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background-color: #16161c;
            border: 1px solid #2d2d3a;
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
            text-align: center;
            font-size: 16px;
        }
        input:focus { border-color: var(--primary); outline: none; }

        .status-box {
            border: 1px solid #2d2d3a;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            background-color: #141419;
            text-align: center;
            font-size: 15px;
        }

        .profile-mini {
            display: flex;
            justify-content: space-between;
            border: 1px solid #22222a;
            padding: 8px 12px;
            border-radius: 8px;
            background: #141419;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .leaderboard {
            margin-bottom: 15px;
            border: 1px solid #22222a;
            padding: 10px;
            border-radius: 8px;
            background-color: #111115;
            font-size: 13px;
        }

        .slot-machine {
            background: #0f0f13;
            border: 2px solid var(--gold);
            border-radius: 12px;
            padding: 8px;
            margin: 5px 0;
            box-shadow: 0 0 15px rgba(255, 238, 0, 0.15);
        }

        .slot-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .slot-cell {
            background: linear-gradient(to bottom, #1a1a24, #252533, #1a1a24);
            border: 1px solid #333345;
            height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            border-radius: 6px;
        }

        .slot-cell.win-active {
            animation: win-blink 0.1s infinite alternate;
            border-color: #fff;
        }

        @keyframes win-blink {
            from { background: #ffaa00; } to { background: #111; }
        }

        .hilo-container {
            background: #141419;
            border: 1px solid #2d2d3a;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            margin: 10px 0;
        }
        .hilo-card {
            font-size: 42px;
            font-weight: bold;
            color: var(--primary);
            margin: 10px 0;
            text-shadow: 0 0 10px rgba(255,170,0,0.3);
        }
        .hilo-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: var(--card);
            border: 1px solid #333340;
            padding: 16px;
            border-radius: 12px;
            width: 85%;
            max-width: 350px;
        }

        .history-item {
            margin: 4px 0;
            padding: 4px;
            border-bottom: 1px solid #1c1c24;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 1. LOGIN SCREEN -->
    <div id="screen-login" class="screen active">
        <h1>🎰 NEON CLUB 🎰</h1>
        <div class="leaderboard">
            <h3 style="font-size:14px; margin:2px 0; color:var(--primary)">🏆 TOP 5 HRÁČI</h3>
            <div id="leaderboard-content" style="line-height: 1.5;">Načítám...</div>
        </div>
        <button class="btn btn-primary" onclick="otevriPrihlaseni()">Vstoupit do herny</button>
        <button class="btn btn-success" onclick="otevriRegistraci()">Nový hráč (100 Kč)</button>
        <div style="display: flex; gap: 6px;">
            <button class="btn" style="font-size:12px; padding:8px;" onclick="exportovatData()">📋 Export</button>
            <button class="btn" style="font-size:12px; padding:8px;" onclick="document.getElementById('file-input').click()">📥 Import</button>
        </div>
        <input type="file" id="file-input" style="display:none" onchange="importovatData(event)">
    </div>

    <!-- 1B. SEZNAM ÚČTŮ -->
    <div id="screen-select-user" class="screen">
        <h2>👥 VYBER ÚČET</h2>
        <div id="users-list"></div>
        <button class="btn btn-danger" onclick="zpetDoMenu()">Zpět</button>
    </div>

    <!-- 1C. REGISTRACE -->
    <div id="screen-register" class="screen">
        <h2>🆕 NOVÝ HRÁČ</h2>
        <input type="text" id="reg-name" placeholder="Zadej jméno" onkeydown="checkEnter(event, potvrditRegistraci)">
        <button class="btn btn-success" onclick="potvrditRegistraci()">Vytvořit účet</button>
        <button class="btn btn-danger" onclick="zpetDoMenu()">Zpět</button>
    </div>

    <!-- 2. MAIN HUB -->
    <div id="screen-hub" class="screen">
        <div class="profile-mini">
            <div>👤 <span id="hub-player-name" style="color:var(--info); font-weight:bold"></span></div>
            <div>💰 <span id="hub-player-money" style="color:var(--primary); font-weight:bold"></span> Kč</div>
        </div>
        <button class="btn btn-primary" onclick="spustitHru(5)">🎰 AUTOMAT: BARY 3x3 🚀</button>
        <button class="btn btn-success" onclick="spustitHru(6)">🃏 NOVINKA: Více / Méně (Hi-Lo)</button>
        <button class="btn" onclick="spustitHru(4)">🔴 Ruleta 0-36 (36x)</button>
        <button class="btn" onclick="spustitHru(1)">🎲 Hádanka 1-10 (10x)</button>
        <button class="btn" onclick="spustitHru(2)">🎲 Hádanka 1-5 (5x)</button>
        <button class="btn" onclick="spustitHru(3)">🎲 Kostka 1-6 (6x)</button>
        <button class="btn btn-danger" style="margin-top:15px;" onclick="odhlasitSe()">Opustit hernu</button>
    </div>

    <!-- 3. GAME SCREEN -->
    <div id="screen-game" class="screen">
        <div class="profile-mini">
            <div id="game-title" style="font-weight:bold; color:var(--info);">HERNA</div>
            <div>💰 <span id="game-player-money" style="color:var(--primary); font-weight:bold"></span> Kč</div>
        </div>

        <!-- AUTOMAT MATICE -->
        <div id="slots-area" style="display:none;">
            <div class="slot-machine">
                <div class="slot-grid">
                    <div class="slot-cell" id="c0">🍒</div><div class="slot-cell" id="c1">🍋</div><div class="slot-cell" id="c2">🛎</div>
                    <div class="slot-cell" id="c3">⭐</div><div class="slot-cell" id="c4">💎</div><div class="slot-cell" id="c5">7️⃣</div>
                    <div class="slot-cell" id="c6">🛎</div><div class="slot-cell" id="c7">🍒</div><div class="slot-cell" id="c8">🍋</div>
                </div>
            </div>
            <div class="slot-controls">
                <button class="btn btn-success" id="btn-spin-slots" onclick="kliknutoCislo(0)" style="margin:0;">START 🎰</button>
                <button class="btn btn-auto" id="btn-auto-slots" onclick="toggleAutoPlay()" style="margin:0;">AUTO</button>
            </div>
        </div>

        <!-- NOVÁ HRA: VÍCE / MÉNĚ -->
        <div id="hilo-area" style="display:none;">
            <div class="hilo-container">
                <div style="font-size:13px; color:#aaa;">AKTUÁLNÍ ČÍSLO</div>
                <div class="hilo-card" id="hilo-current-card">5</div>
                <div style="font-size:12px; color:#777; margin-bottom:10px;">Další bude...</div>
                <div class="hilo-btns">
                    <button class="btn btn-primary" id="btn-hilo-high" onclick="hrajHiLo('H')">VYŠŠÍ ▲</button>
                    <button class="btn btn-danger" id="btn-hilo-low" onclick="hrajHiLo('L')">NIŽŠÍ ▼</button>
                </div>
            </div>
        </div>

        <!-- TLAČÍTKA ČÍSEL PRO KLASICKÉ HRY -->
        <div id="classic-inputs" style="display:none;">
            <div style="text-align:center; font-size:12px; color:#888; margin-bottom:4px;">Kliknutím na číslo vsadíš:</div>
            <div class="number-grid" id="game-number-buttons"></div>
        </div>

        <!-- VOLBA SÁZKY -->
        <div class="bet-buttons">
            <button class="btn btn-bet" id="bet-10" onclick="nastavSazku(10)">10</button>
            <button class="btn btn-bet" id="bet-20" onclick="nastavSazku(20)">20</button>
            <button class="btn btn-bet" id="bet-50" onclick="nastavSazku(50)">50</button>
            <button class="btn btn-bet" id="bet-100" onclick="nastavSazku(100)">100</button>
            <button class="btn btn-bet" id="bet-cust" onclick="ukazVlastniSazku()">✏️</button>
        </div>

        <div id="custom-sazka-area" style="display:none;">
            <input type="number" id="game-sazka" placeholder="Vlastní sázka + Enter" onkeydown="checkEnter(event, potvrditVlastniSazku)">
        </div>

        <!-- VÝSLEDKY -->
        <div class="status-box" id="game-result" style="display:none; font-weight:bold;"></div>
        
        <!-- LIŠTA DOLE -->
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:6px; margin-top:8px;">
            <button class="btn" style="margin:0; padding:10px;" onclick="otevriStatsModal()">📊 Statistiky</button>
            <button class="btn btn-danger" style="margin:0; padding:10px;" onclick="navratDoHubu()">🚪 Menu</button>
        </div>
    </div>

    <!-- 4. SOCKA SCREEN -->
    <div id="screen-socka" class="screen">
        <h2 style="color:var(--danger)">💀 ČISTÁ KASA 💀</h2>
        <p id="socka-text" style="text-align:center; min-height:40px; color:#aaa;"></p>
        <button class="btn btn-danger" onclick="zpetDoMenu()">Zpět na začátek</button>
    </div>
</div>

<!-- STATISTIKY -->
<div id="stats-modal" class="modal" onclick="zavriStatsModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 style="color:var(--info); margin-top:0;">📊 PŘEHLED HRÁČE</h3>
        <div id="modal-stats-data" style="font-size:14px; margin-bottom:10px; line-height:1.5;"></div>
        <h4 style="margin:5px 0; font-size:13px; color:#888;">Posledních 5 her:</h4>
        <div id="modal-history-data"></div>
        <button class="btn btn-danger" style="margin-top:12px; padding:8px;" onclick="zavriStatsModal()">Zavřít</button>
    </div>
</div>

<script>
    let uzivatele = JSON.parse(localStorage.getItem('c_uziv')) || {};
    let statistiky = JSON.parse(localStorage.getItem('c_stat')) || {};
    let scoreTable = JSON.parse(localStorage.getItem('c_scor')) || [];

    let aktualniHrac = null;
    let aktualniHraId = 0;
    let aktualniSazka = 10; 
    let autoPlayInterval = null;
    let hiloAktualniCislo = 5;

    const symboly = ["🍒", "🛎", "🍋", "⭐", "💎", "7️⃣"];
    const vyherniLinie = [[0,1,2],[3,4,5],[6,7,8],[0,4,8],[2,4,6]];

    function saveAll() {
        localStorage.setItem('c_uziv', JSON.stringify(uzivatele));
        localStorage.setItem('c_stat', JSON.stringify(statistiky));
        localStorage.setItem('c_scor', JSON.stringify(scoreTable));
        aktualizovatTabulku();
    }

    function checkEnter(event, akce) {
        if (event.key === "Enter") {
            event.preventDefault();
            akce();
        }
    }

    function prepniObrazovku(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
    
    function zpetDoMenu() { stopAutoPlay(); prepniObrazovku('screen-login'); }
    function navratDoHubu() { 
        stopAutoPlay();
        document.getElementById('hub-player-money').innerText = uzivatele[aktualniHrac];
        prepniObrazovku('screen-hub'); 
    }

    function aktualizovatTabulku() {
        const div = document.getElementById('leaderboard-content');
        if (!div) return;
        if (scoreTable.length === 0) { div.innerHTML = "<span style='color:#666'>Zatím žádné rekordy...</span>"; return; }
        scoreTable.sort((a,b) => b.castka - a.castka);
        let html = "";
        scoreTable.slice(0, 5).forEach((s, idx) => {
            html += `<div><b>${idx+1}.</b> ${s.jmeno} -> <span style="color:var(--success)">${s.castka} Kč</span></div>`;
        });
        div.innerHTML = html;
    }

    function otevriPrihlaseni() {
        prepniObrazovku('screen-select-user');
        const div = document.getElementById('users-list'); div.innerHTML = "";
        Object.keys(uzivatele).forEach(k => {
            const row = document.createElement('div'); row.className = "user-row";
            const bS = document.createElement('button'); bS.className = "btn btn-user-select";
            bS.innerText = `${k} (${uzivatele[k]} Kč)`; bS.onclick = () => prihlasitHrace(k);
            const bD = document.createElement('button'); bD.className = "btn btn-delete";
            bD.innerText = "🗑"; bD.onclick = (e) => { e.stopPropagation(); smazatUcet(k); };
            row.appendChild(bS); row.appendChild(bD); div.appendChild(row);
        });
    }

    function smazatUcet(jmeno) {
        if (confirm(`Smazat permanentně hráče ${jmeno}?`)) {
            delete uzivatele[jmeno]; delete statistiky[jmeno];
            scoreTable = scoreTable.filter(i => i.jmeno !== jmeno); saveAll(); otevriPrihlaseni();
        }
    }

    function prihlasitHrace(jmeno) {
        if (uzivatele[jmeno] <= 0) { detekceSocky(jmeno); return; }
        aktualniHrac = jmeno;
        document.getElementById('hub-player-name').innerText = jmeno;
        document.getElementById('hub-player-money').innerText = uzivatele[jmeno];
        prepniObrazovku('screen-hub');
    }

    function otevriRegistraci() { 
        document.getElementById('reg-name').value = ""; 
        prepniObrazovku('screen-register'); 
        setTimeout(() => document.getElementById('reg-name').focus(), 100);
    }
    function potvrditRegistraci() {
        const jmeno = document.getElementById('reg-name').value.trim();
        if (!jmeno || jmeno.includes(';') || jmeno.includes(',')) { alert("Neplatné jméno!"); return; }
        if (uzivatele[jmeno] !== undefined) { alert("Tento hráč už existuje!"); return; }
        uzivatele[jmeno] = 100; statistiky[jmeno] = {vyhry:0, prohry:0, historie:[]}; saveAll(); prihlasitHrace(jmeno);
    }
    function odhlasitSe() { aktualniHrac = null; zpetDoMenu(); }

    function vygenerujCiselnik(od, doCisla) {
        const kontajner = document.getElementById('game-number-buttons');
        kontajner.innerHTML = "";
        for(let i = od; i <= doCisla; i++) {
            const b = document.createElement('button');
            b.className = "btn-num"; b.innerText = i;
            b.onclick = () => kliknutoCislo(i);
            kontajner.appendChild(b);
        }
    }

    function spustitHru(id) {
        aktualniHraId = id;
        document.getElementById('game-player-money').innerText = uzivatele[aktualniHrac];
        document.getElementById('game-result').style.display = "none";
        document.getElementById('custom-sazka-area').style.display = "none";
        document.querySelectorAll('.slot-cell').forEach(c => c.classList.remove('win-active'));
        
        nastavSazku(10); 

        // Skrýt vše specifické
        document.getElementById('slots-area').style.display = "none";
        document.getElementById('hilo-area').style.display = "none";
        document.getElementById('classic-inputs').style.display = "none";

        if(id === 5) {
            document.getElementById('game-title').innerText = "🎰 AUTOMAT BARY";
            document.getElementById('slots-area').style.display = "block";
        } else if(id === 6) {
            document.getElementById('game-title').innerText = "🃏 VÍCE / MÉNĚ";
            document.getElementById('hilo-area').style.display = "block";
            hiloAktualniCislo = Math.floor(Math.random() * 8) + 2; // 2 až 9 do startu
            document.getElementById('hilo-current-card').innerText = hiloAktualniCislo;
        } else {
            document.getElementById('classic-inputs').style.display = "block";
            if(id === 1) { document.getElementById('game-title').innerText = "🎲 HÁDANKA 1-10"; vygenerujCiselnik(1, 10); }
            else if(id === 2) { document.getElementById('game-title').innerText = "🎲 HÁDANKA 1-5"; vygenerujCiselnik(1, 5); }
            else if(id === 3) { document.getElementById('game-title').innerText = "🎲 KOSTKA"; vygenerujCiselnik(1, 6); }
            else if(id === 4) { document.getElementById('game-title').innerText = "🔴 RULETA"; vygenerujCiselnik(0, 36); }
        }
        prepniObrazovku('screen-game');
    }

    function nastavSazku(hodnota) {
        aktualniSazka = hodnota;
        document.querySelectorAll('.btn-bet').forEach(b => b.classList.remove('selected'));
        if ([10, 20, 50, 100].includes(hodnota)) {
            const btn = document.getElementById(`bet-${hodnota}`);
            if (btn) btn.classList.add('selected');
            document.getElementById('custom-sazka-area').style.display = "none";
        } else {
            const btnCust = document.getElementById('bet-cust');
            if (btnCust) btnCust.classList.add('selected');
        }
    }

    function ukazVlastniSazku() {
        const area = document.getElementById('custom-sazka-area');
        if (area.style.display === "none") {
            area.style.display = "block";
            const inp = document.getElementById('game-sazka'); inp.value = aktualniSazka; inp.focus();
        } else {
            area.style.display = "none";
        }
    }

    function potvrditVlastniSazku() {
        const val = parseInt(document.getElementById('game-sazka').value);
        if (isNaN(val) || val <= 0) { alert("Chybná částka!"); return; }
        nastavSazku(val);
        document.getElementById('custom-sazka-area').style.display = "none";
    }

    function toggleAutoPlay() {
        const btn = document.getElementById('btn-auto-slots');
        if (autoPlayInterval) {
            stopAutoPlay();
        } else {
            btn.classList.add('active');
            btn.innerText = "STOP";
            kliknutoCislo(0); // První otočení okamžitě
            autoPlayInterval = setInterval(() => {
                if (uzivatele[aktualniHrac] >= aktualniSazka) {
                    kliknutoCislo(0);
                } else {
                    stopAutoPlay();
                }
            }, 600); // Rychlá kadence pro autoplay
        }
    }

    function stopAutoPlay() {
        if (autoPlayInterval) {
            clearInterval(autoPlayInterval);
            autoPlayInterval = null;
        }
        const btn = document.getElementById('btn-auto-slots');
        if (btn) {
            btn.classList.remove('active');
            btn.innerText = "AUTO";
        }
    }

    function zapisZapas(jmeno, hra, sazka, text, jeVyhra) {
        if (!statistiky[jmeno]) statistiky[jmeno] = {vyhry:0, prohry:0, historie:[]};
        if (jeVyhra) statistiky[jmeno].vyhry++; else statistiky[jmeno].prohry++;
        statistiky[jmeno].historie.unshift(`${hra}(S:${sazka}kč)-${text}`);
        statistiky[jmeno].historie = statistiky[jmeno].historie.slice(0, 5);
    }

    function kliknutoCislo(zvoleneCislo) {
        const konto = uzivatele[aktualniHrac];
        if (aktualniSazka > konto) { 
            stopAutoPlay(); 
            alert("Nemáš dost peněz na sázku!"); 
            return; 
        }

        let starePenize = konto;
        uzivatele[aktualniHrac] -= aktualniSazka;
        document.getElementById('game-player-money').innerText = uzivatele[aktualniHrac];
        document.getElementById('game-result').style.display = "none";
        document.querySelectorAll('.slot-cell').forEach(c => c.classList.remove('win-active'));
        
        // Zamezení klikání během otočky jen pokud neběží auto
        if (!autoPlayInterval) {
            document.querySelectorAll('.btn-bet, .btn-num').forEach(b => b.disabled = true);
            const spinBtn = document.getElementById('btn-spin-slots'); if(spinBtn) spinBtn.disabled = true;
        }

        if (aktualniHraId === 5) {
            // SUPER RYCHLÝ AUTOMAT (Jen 3 rychlé cykly animace)
            let cykly = 0;
            let anim = setInterval(() => {
                for(let i=0; i<9; i++) document.getElementById(`c${i}`).innerText = symboly[Math.floor(Math.random()*6)];
                cykly++;
                if(cykly > 2) { 
                    clearInterval(anim);
                    let mat = [];
                    for(let i=0; i<9; i++) {
                        mat.push(symboly[Math.floor(Math.random()*6)]);
                        document.getElementById(`c${i}`).innerText = mat[i];
                    }
                    let vyhra = 0; let bunky = new Set(); let jp = false;
                    vyherniLinie.forEach(l => {
                        if (mat[l[0]] === mat[l[1]] && mat[l[1]] === mat[l[2]]) {
                            let n = (mat[l[0]] === "7️⃣") ? 50 : 5; if(n===50) jp = true;
                            vyhra += aktualniSazka * n; l.forEach(x => bunky.add(x));
                        }
                    });
                    ukonciKoloZapasu(vyhra, vyhra > 0, "Bary3x3", jp ? "🔥777!🔥" : `VÝHRA`, bunky, starePenize);
                }
            }, 50);
        } else {
            // Rychlé vyhodnocení klasických her
            setTimeout(() => {
                let cislo = 0; let nasob = 1; let nzv = "";
                if(aktualniHraId===1){ cislo=Math.floor(Math.random()*10)+1; nasob=10; nzv="Hádanka1-10"; }
                else if(aktualniHraId===2){ cislo=Math.floor(Math.random()*5)+1; nasob=5; nzv="Hádanka1-5"; }
                else if(aktualniHraId===3){ cislo=Math.floor(Math.random()*6)+1; nasob=6; nzv="Kostka"; }
                else if(aktualniHraId===4){ cislo=Math.floor(Math.random()*37); nasob=36; nzv="Ruleta"; }
                
                let vh = (zvoleneCislo === cislo);
                ukonciKoloZapasu(vh ? aktualniSazka*nasob : 0, vh, nzv, `Tvá volba:${zvoleneCislo} | Padlo:${cislo}`, null, starePenize);
            }, 80);
        }
    }

    // NOVÁ HRA: FUNKCE VÍCE / MÉNĚ (Hi-Lo)
    function hrajHiLo(tip) {
        const konto = uzivatele[aktualniHrac];
        if (aktualniSazka > konto) { alert("Nemáš dost peněz!"); return; }

        let starePenize = konto;
        uzivatele[aktualniHrac] -= aktualniSazka;

        let noveCislo = Math.floor(Math.random() * 10) + 1; // 1 až 10
        let vh = false;

        if (tip === 'H' && noveCislo > hiloAktualniCislo) vh = true;
        if (tip === 'L' && noveCislo < hiloAktualniCislo) vh = true;
        if (noveCislo === hiloAktualniCislo) vh = (Math.random() > 0.5); // Remíza náhodná šance

        let textZobrazeni = `Původní:${hiloAktualniCislo} | Nové:${noveCislo}`;
        hiloAktualniCislo = noveCislo;
        document.getElementById('hilo-current-card').innerText = hiloAktualniCislo;

        ukonciKoloZapasu(vh ? aktualniSazka * 2 : 0, vh, "VíceMéně", textZobrazeni, null, starePenize);
    }

    function ukonciKoloZapasu(vyhraMnozstvi, jeVyhra, nazevHry, txt, bunkyKBlikani, starePenize) {
        if (!autoPlayInterval) {
            document.querySelectorAll('.btn-bet, .btn-num').forEach(b => b.disabled = false);
            const spinBtn = document.getElementById('btn-spin-slots'); if(spinBtn) spinBtn.disabled = false;
        }
        
        const resBox = document.getElementById('game-result');
        resBox.style.display = "block";

        if(jeVyhra) {
            uzivatele[aktualniHrac] += vyhraMnozstvi;
            if(bunkyKBlikani) bunkyKBlikani.forEach(idx => document.getElementById(`c${idx}`).classList.add('win-active'));
            resBox.innerHTML = `<span style="color:var(--success)">🎉 +${vyhraMnozstvi} Kč<br><small>${txt}</small></span>`;
            zapisZapas(aktualniHrac, nazevHry, aktualniSazka, `VÝHRA`, true);
        } else {
            resBox.innerHTML = `<span style="color:var(--danger)">❌ Prohra<br><small>${txt}</small></span>`;
            zapisZapas(aktualniHrac, nazevHry, aktualniSazka, `PROHRA`, false);
        }

        document.getElementById('game-player-money').innerText = uzivatele[aktualniHrac];
        
        const milniky = [200,300,400,500,600,700,800,900,1000,1500,2000,3000,5000,10000];
        milniky.forEach(m => {
            if (starePenize < m && uzivatele[aktualniHrac] >= m) {
                scoreTable.push({jmeno: aktualniHrac, castka: uzivatele[aktualniHrac]});
            }
        });
        saveAll();

        if (uzivatele[aktualniHrac] <= 0) {
            stopAutoPlay();
            setTimeout(() => { detekceSocky(aktualniHrac); }, 300);
        }
    }

    function otevriStatsModal() {
        const s = statistiky[aktualniHrac] || {vyhry:0, prohry:0, historie:[]};
        const celkem = s.vyhry + s.prohry;
        const procento = celkem > 0 ? ((s.vyhry / celkem) * 100).toFixed(1) : 0;

        document.getElementById('modal-stats-data').innerHTML = `
            👤 Hráč: <b>${aktualniHrac}</b><br>
            🔄 Celkem her: <b>${celkem}</b><br>
            🟢 Výhry: <span style="color:var(--success)"><b>${s.vyhry}</b></span><br>
            🔴 Prohry: <span style="color:var(--danger)"><b>${s.prohry}</b></span><br>
            📈 Úspěšnost: <span style="color:var(--primary)"><b>${procento}%</b></span>
        `;

        const histBox = document.getElementById('modal-history-data'); histBox.innerHTML = "";
        if(s.historie.length === 0) histBox.innerHTML = "Žádné odehrané zápasy.";
        s.historie.forEach(h => {
            const item = document.createElement('div'); item.className = "history-item";
            item.style.color = h.includes('VÝHRA') ? 'var(--success)' : 'var(--danger)';
            item.innerText = `• ${h}`; histBox.appendChild(item);
        });

        document.getElementById('stats-modal').style.display = "flex";
    }
    function zavriStatsModal() { document.getElementById('stats-modal').style.display = "none"; }

    function detekceSocky(jmeno) {
        uzivatele[jmeno] = 0; saveAll();
        document.getElementById('socka-text').innerText = `Hráč ${jmeno} prohrál úplně všechno. Ochranka tě vyvedla z casina!`;
        prepniObrazovku('screen-socka');
    }

    function exportovatData() {
        const b = { u: uzivatele, s: statistiky, h: scoreTable };
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(b));
        const a = document.createElement('a'); a.setAttribute("href", dataStr);
        a.setAttribute("download", "neon_hub_data.json"); document.body.appendChild(a); a.click(); a.remove();
    }
    function importovatData(ev) {
        const f = ev.target.files[0]; if (!f) return;
        const r = new FileReader(); r.onload = function(e) {
            try {
                const b = JSON.parse(e.target.result);
                if(b.u && b.s) { uzivatele=b.u; statistiky=b.s; scoreTable=b.h||[]; saveAll(); otevriPrihlaseni(); }
            } catch(x) { alert("Chyba při čtení zálohy."); }
        }; r.readAsText(f);
    }
    
    document.addEventListener("DOMContentLoaded", () => {
        aktualizovatTabulku();
    });
</script>
</body>
